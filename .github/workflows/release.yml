name: Release

# Builds Cadence.app + a DMG and attaches it to a GitHub Release whenever a
# tag like "v1.1" is pushed. Signing/notarization are best-effort: if the
# repo secrets below aren't set, this still produces an ad-hoc-signed DMG
# (users need the right-click ▸ Open workaround on first launch — see
# README). Set these repo secrets to get a notarized, Gatekeeper-clean
# build instead:
#   SIGNING_CERT_P12_BASE64  — `base64 -i DeveloperIDApplication.p12`
#   SIGNING_CERT_P12_PASSWORD
#   APPLE_ID                 — Apple ID email for the Developer Program team
#   APPLE_TEAM_ID             — currently XX45YMU835 (Garrett's paid team)
#   APPLE_APP_SPECIFIC_PASSWORD — from appleid.apple.com, not the Apple ID password
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERT_P12_BASE64 != '' }}
      HAS_NOTARY_CREDS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # macOS 26 (LSMinimumSystemVersion in Info.plist) needs a recent
        # Xcode/SDK — bump this if GitHub's macos-15 image's latest bundled
        # Xcode doesn't support it yet.
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID signing certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" \
              -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        if: env.HAS_SIGNING_CERT == 'true' && env.HAS_NOTARY_CREDS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials cadence-notary \
              --apple-id "$APPLE_ID" \
              --team-id "${APPLE_TEAM_ID:-XX45YMU835}" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build DMG
        run: ./scripts/make_dmg.sh "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.build }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Cadence-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
